<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <meta name="theme-color" content="#dc2626" />
    <meta
      name="description"
      content="Dynamic Content Builder - A modular, drag-and-drop page designer built with React."
    />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <title>DESIGNER.io | Content Builder</title>

    <style>
      /* Pre-loader CSS: 
        This displays a pulsing loading text while the React code is downloading. 
        Recruiters look for this level of UX polish.
      */
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, sans-serif;
        background-color: #f9fafb; /* Matches your Tailwind bg-gray-50 */
      }
      
      #root:empty {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      
      #root:empty::after {
        content: "Initializing Workspace...";
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #dc2626; /* Tailwind red-600 */
        font-size: 14px;
        animation: pulse 1.5s infinite ease-in-out;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding: 20px; text-align: center; color: #dc2626; font-family: 'Inter', sans-serif;">
        <strong>Error:</strong> You need to enable JavaScript to run the Dynamic Content Builder.
      </div>
    </noscript>
    
    <div id="root"></div>
    
  </body>
</html>
